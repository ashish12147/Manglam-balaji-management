  '@types/react': 19.2.7
  '@types/react-dom': 19.2.3
  eslint: 10.7.0
  prettier: 3.9.5
  react: 19.2.3
  react-dom: 19.2.3
  typescript: 7.0.2
  vitest: 4.1.10
  zod: 4.2.1
