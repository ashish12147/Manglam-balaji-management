packages:
  - apps/*
  - packages/*

nodeLinker: hoisted

allowBuilds:
  '@prisma/engines': true
  '@scarf/scarf': false
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

catalog:
