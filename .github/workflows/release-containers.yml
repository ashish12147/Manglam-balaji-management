name: Release containers

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target: [api, worker, admin-web, migration]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Require a semantic-version release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          echo "$RELEASE_TAG" | grep -Eq
          '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$'
      - name: Require production admin API URL
        if: matrix.target == 'admin-web'
        env:
          ADMIN_PUBLIC_API_URL: ${{ vars.ADMIN_PUBLIC_API_URL }}
        run: test -n "$ADMIN_PUBLIC_API_URL" && echo "$ADMIN_PUBLIC_API_URL" | grep -Eq '^https://'
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/manglam-${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          target: ${{ matrix.target }}
          load: true
          push: false
          tags: |
            manglam-${{ matrix.target }}:release-candidate
            ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: NEXT_PUBLIC_API_URL=${{ vars.ADMIN_PUBLIC_API_URL }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          provenance: false
          sbom: false
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: manglam-${{ matrix.target }}:release-candidate
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          image: manglam-${{ matrix.target }}:release-candidate
          format: spdx-json
          output-file: sbom-${{ matrix.target }}.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-sbom-${{ matrix.target }}
          path: sbom-${{ matrix.target }}.spdx.json
          retention-days: 90
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish scanned image tags
        env:
          IMAGE_TAGS: ${{ steps.metadata.outputs.tags }}
          SCANNED_IMAGE: manglam-${{ matrix.target }}:release-candidate
        run: |
          set -euo pipefail
          scanned_image_id="$(docker image inspect --format '{{.Id}}' "$SCANNED_IMAGE")"
          while IFS= read -r image_tag; do
            if [ -n "$image_tag" ]; then
              image_id="$(docker image inspect --format '{{.Id}}' "$image_tag")"
              if [ "$image_id" != "$scanned_image_id" ]; then
                echo "Refusing to push $image_tag because it differs from $SCANNED_IMAGE" >&2
                exit 1
              fi
              docker push "$image_tag"
            fi
          done <<< "$IMAGE_TAGS"
