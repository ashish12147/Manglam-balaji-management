name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  NODE_VERSION: 24.13.0
  PNPM_VERSION: 11.9.0

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:validate
      - run: pnpm db:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  integration:
    name: Integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17.10-alpine3.23
        env:
          POSTGRES_DB: manglam_ci
          POSTGRES_PASSWORD: ci-isolated-password
          POSTGRES_USER: manglam_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manglam_ci -d manglam_ci" --health-interval 5s
          --health-timeout 5s --health-retries 12
      redis:
        image: redis:8.8.0-alpine3.23
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      DATABASE_URL: postgresql://manglam_ci:ci-isolated-password@127.0.0.1:5432/manglam_ci?schema=public
      TEST_DATABASE_URL: postgresql://manglam_ci:ci-isolated-password@127.0.0.1:5432/manglam_ci
      TEST_REDIS_URL: redis://127.0.0.1:6379/0
      TEST_S3_ENDPOINT: http://127.0.0.1:9000
      TEST_S3_ACCESS_KEY_ID: manglam-ci
      TEST_S3_SECRET_ACCESS_KEY: ci-isolated-minio-password
      TEST_S3_BUCKET: manglam-ci
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Start MinIO
        run: >-
          docker run --detach --rm --name manglam-ci-minio --publish 9000:9000 --env
          MINIO_ROOT_USER="$TEST_S3_ACCESS_KEY_ID" --env
          MINIO_ROOT_PASSWORD="$TEST_S3_SECRET_ACCESS_KEY" minio/minio:RELEASE.2025-09-07T16-13-09Z
          server /data
      - name: Wait for MinIO and create bucket
        run: |
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:9000/minio/health/ready && break
            if [ "$attempt" = 30 ]; then docker logs manglam-ci-minio; exit 1; fi
            sleep 2
          done
          docker run --rm --network host --entrypoint /bin/sh \
            minio/mc:RELEASE.2025-08-13T08-35-41Z -c \
            "mc alias set ci http://127.0.0.1:9000 '$TEST_S3_ACCESS_KEY_ID' '$TEST_S3_SECRET_ACCESS_KEY' && mc mb ci/$TEST_S3_BUCKET"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm test:integration
      - name: MinIO logs on failure
        if: failure()
        run: docker logs manglam-ci-minio

  dependency-policy:
    name: Dependency and license policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high --prod
      - run: >-
          pnpm licenses list --prod --json --filter '@manglam/api...' --filter '@manglam/worker...'
          --filter '@manglam/admin-web...' > production-licenses.json
      - run: node scripts/Check-Licenses.mjs production-licenses.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-licenses
          path: production-licenses.json
          retention-days: 30
